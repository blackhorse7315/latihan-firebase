<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Task Manager + Push</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-messaging.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-h39tlvtH3Phe9F9MisHGUb57VuOl_9s",
            authDomain: "latihan-firebase-c8288.firebaseapp.com",
            projectId: "latihan-firebase-c8288",
            storageBucket: "latihan-firebase-c8288.firebasestorage.app",
            messagingSenderId: "827332191451",
            appId: "1:827332191451:web:be1f7f4cf8b18bcb59d8fe",
            measurementId: "G-80EE35QN31"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const messaging = getMessaging(app);
        const appId = 'latihan-firebase-c8288';
        const VAPID_KEY = "BC0VTzq3QEXGEhg57GCk-mjDQGg25aH0qypuaBpSlX8n1dGJySAme_BplviUYER0XsCykz1__aF9586Fu-oQbk8";

        const statusMsg = document.getElementById('statusMsg');
        const tokenDisplay = document.getElementById('tokenDisplay');
        const tokenSection = document.getElementById('tokenSection');

        async function registerSW() {
            if ('serviceWorker' in navigator) {
                try {
                    const registration = await navigator.serviceWorker.register('./firebase-messaging-sw.js');
                    return registration;
                } catch (err) {
                    console.error('SW Register Error:', err);
                    return null;
                }
            }
            return null;
        }

        async function requestNotificationPermission() {
            try {
                showStatus("Menghubungkan ke Cloud Messaging...", "bg-blue-500");
                const swReg = await registerSW();
                const permission = await Notification.requestPermission();
                
                if (permission === 'granted') {
                    const token = await getToken(messaging, { 
                        vapidKey: VAPID_KEY,
                        serviceWorkerRegistration: swReg 
                    });

                    if (token) {
                        tokenDisplay.value = token;
                        tokenSection.classList.remove('hidden');
                        showStatus("Cloud Messaging Aktif!", "bg-green-600");
                    }
                } else {
                    showStatus("Izin Ditolak (" + permission + ")", "bg-red-500");
                }
            } catch (error) {
                console.error("FCM Error:", error);
                showStatus("Error: " + error.code, "bg-red-600");
            }
        }

        // MENANGANI NOTIFIKASI DARI CLOUD (Firebase Console)
        onMessage(messaging, (payload) => {
            console.log('Pesan Cloud Diterima:', payload);
            
            // Munculkan notifikasi visual di layar
            new Notification(payload.notification.title, {
                body: payload.notification.body,
                icon: 'https://cdn-icons-png.flaticon.com/512/3119/3119338.png'
            });
            
            showStatus("Pesan Masuk: " + payload.notification.title, "bg-indigo-600");
        });

        // Test Lokal
        window.testLocalNotif = () => {
            if (Notification.permission === 'granted') {
                new Notification("Test Berhasil!", { 
                    body: "Browser kamu sudah siap menerima pesan dari Firebase Cloud.",
                    icon: 'https://cdn-icons-png.flaticon.com/512/3119/3119338.png'
                });
            } else {
                showStatus("Aktifkan izin dulu!", "bg-yellow-500");
            }
        };

        window.copyToken = () => {
            tokenDisplay.select();
            document.execCommand('copy');
            showStatus("Token disalin! Gunakan di Firebase Console.", "bg-indigo-500");
        };

        // Database Logic
        document.getElementById('notifBtn').addEventListener('click', requestNotificationPermission);
        document.getElementById('addBtn').addEventListener('click', async () => {
            const input = document.getElementById('taskInput');
            if (!input.value.trim()) return;
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'tasks'), { 
                    text: input.value, createdAt: serverTimestamp() 
                });
                input.value = "";
                showStatus("Data tersimpan di Database!", "bg-green-500");
            } catch (e) {
                showStatus("Gagal simpan data.", "bg-red-500");
            }
        });

        onAuthStateChanged(auth, (user) => { if(user) loadTasks(); });
        function loadTasks() {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'tasks'), (snap) => {
                const list = document.getElementById('taskList');
                list.innerHTML = "";
                snap.forEach((d) => {
                    const div = document.createElement('div');
                    div.className = "flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm mb-3 border border-gray-100";
                    div.innerHTML = `<span>${d.data().text}</span>
                        <button onclick="deleteTask('${d.id}')" class="text-red-400 font-bold hover:bg-red-50 p-2 rounded-lg">Hapus</button>`;
                    list.appendChild(div);
                });
            });
        }

        window.deleteTask = async (id) => {
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', id));
        };

        function showStatus(msg, color) {
            statusMsg.textContent = msg;
            statusMsg.className = `fixed bottom-4 right-4 ${color} text-white px-4 py-2 rounded-xl shadow-lg z-50 transition-all`;
            statusMsg.style.opacity = '1';
            setTimeout(() => statusMsg.style.opacity = '0', 4000);
        }

        window.onload = () => { signInAnonymously(auth); };
    </script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-gray-100">
        <!-- Header -->
        <div class="bg-indigo-600 p-8 text-white">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-bold tracking-tight">Task Manager</h1>
                    <p class="text-xs opacity-80">Firestore + Cloud Messaging</p>
                </div>
                <button id="notifBtn" class="bg-white/20 p-3 rounded-2xl hover:bg-white/30 transition-all active:scale-95 shadow-inner">
                    🔔
                </button>
            </div>
        </div>

        <!-- Main UI -->
        <div class="p-6">
            <div class="flex gap-2 mb-8">
                <input type="text" id="taskInput" placeholder="Tulis tugas baru..." 
                    class="flex-1 px-5 py-3 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-400 transition-all">
                <button id="addBtn" class="bg-indigo-600 text-white px-6 py-2 rounded-2xl font-bold shadow-lg shadow-indigo-100">Add</button>
            </div>
            
            <div id="taskList" class="min-h-[100px]"></div>

            <!-- Token & Instructions -->
            <div id="tokenSection" class="mt-8 pt-6 border-t border-dashed border-gray-200 hidden">
                <div class="flex justify-between items-center mb-2">
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Device Token:</p>
                    <button onclick="copyToken()" class="text-[10px] text-indigo-600 font-bold hover:underline">Copy Token</button>
                </div>
                <textarea id="tokenDisplay" readonly class="w-full text-[9px] bg-gray-50 p-3 rounded-xl border border-gray-100 font-mono h-16 outline-none resize-none mb-4"></textarea>
                
                <div class="bg-amber-50 p-4 rounded-2xl border border-amber-100">
                    <p class="text-[11px] text-amber-800 font-bold mb-1">🚀 Cara Tes Notifikasi Cloud:</p>
                    <ol class="text-[10px] text-amber-700 space-y-1 list-decimal ml-3">
                        <li>Klik <b>Copy Token</b> di atas.</li>
                        <li>Buka <b>Firebase Console > Messaging</b>.</li>
                        <li>Klik <b>New Campaign</b> > <b>Notifications</b>.</li>
                        <li>Isi Judul & Teks, lalu klik <b>Send Test Message</b>.</li>
                        <li>Tempel (Paste) Token kamu dan klik <b>Test</b>.</li>
                    </ol>
                </div>
                
                <button onclick="testLocalNotif()" class="mt-4 w-full py-2 bg-gray-100 text-gray-500 rounded-xl text-[10px] font-bold hover:bg-gray-200 transition-all">
                    Test Munculkan Notifikasi Browser
                </button>
            </div>
        </div>
    </div>
    <div id="statusMsg" class="opacity-0 pointer-events-none"></div>
</body>
</html>
