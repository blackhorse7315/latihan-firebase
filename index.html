<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Task Manager + Push</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-messaging.js";

        // --- KONFIGURASI FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyC-h39tlvtH3Phe9F9MisHGUb57VuOl_9s",
            authDomain: "latihan-firebase-c8288.firebaseapp.com",
            projectId: "latihan-firebase-c8288",
            storageBucket: "latihan-firebase-c8288.firebasestorage.app",
            messagingSenderId: "827332191451",
            appId: "1:827332191451:web:be1f7f4cf8b18bcb59d8fe",
            measurementId: "G-80EE35QN31"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const messaging = getMessaging(app);
        const appId = 'latihan-firebase-c8288';

        // --- KONFIGURASI VAPID KEY KAMU ---
        const VAPID_KEY = "BC0VTzq3QEXGEhg57GCk-mjDQGg25aH0qypuaBpSlX8n1dGJySAme_BplviUYER0XsCykz1__aF9586Fu-oQbk8";

        // Elemen UI
        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const taskList = document.getElementById('taskList');
        const statusMsg = document.getElementById('statusMsg');
        const authStatus = document.getElementById('authStatus');
        const notifBtn = document.getElementById('notifBtn');
        const tokenDisplay = document.getElementById('tokenDisplay');

        // Fungsi Request Notifikasi
        async function requestNotificationPermission() {
            try {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    const token = await getToken(messaging, { vapidKey: VAPID_KEY });
                    if (token) {
                        console.log("Token FCM Anda:", token);
                        tokenDisplay.value = token;
                        tokenDisplay.parentElement.classList.remove('hidden');
                        showStatus("Notifikasi Aktif!", "bg-green-600");
                    }
                } else {
                    showStatus("Izin ditolak.", "bg-red-500");
                }
            } catch (error) {
                console.error("Error FCM:", error);
                showStatus("Gagal aktifkan push.", "bg-red-500");
            }
        }

        // Terima notifikasi saat aplikasi TERBUKA
        onMessage(messaging, (payload) => {
            console.log('Pesan diterima:', payload);
            showStatus(`Notif: ${payload.notification.title}`, "bg-indigo-600");
        });

        // Event Listener Notifikasi
        notifBtn.addEventListener('click', requestNotificationPermission);

        // --- LOGIKA DATABASE ---
        const initAuth = async () => {
            try { await signInAnonymously(auth); } catch (e) { console.error(e); }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                authStatus.innerHTML = `Status: <span class="text-green-400 font-bold">Online</span> (UID: ${user.uid.substring(0, 5)}...)`;
                loadTasks();
            }
        });

        function loadTasks() {
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'tasks');
            onSnapshot(colRef, (snapshot) => {
                taskList.innerHTML = "";
                if (snapshot.empty) {
                    taskList.innerHTML = "<p class='text-gray-400 text-center py-4 text-sm'>Daftar kosong.</p>";
                    return;
                }
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const div = document.createElement('div');
                    div.className = "flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-gray-100 mb-3 hover:shadow-md transition-all";
                    div.innerHTML = `
                        <span class="text-gray-700 font-medium">${data.text}</span>
                        <button onclick="deleteTask('${doc.id}')" class="bg-red-50 text-red-400 hover:bg-red-100 p-2 rounded-lg transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                            </svg>
                        </button>`;
                    taskList.appendChild(div);
                });
            }, (err) => console.error(err));
        }

        addBtn.addEventListener('click', async () => {
            const val = taskInput.value.trim();
            if (!val) return;
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'tasks');
            await addDoc(colRef, { text: val, createdAt: serverTimestamp() });
            taskInput.value = "";
            showStatus("Berhasil ditambah!", "bg-green-500");
        });

        window.deleteTask = async (id) => {
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', id));
            showStatus("Berhasil dihapus.", "bg-blue-500");
        };

        function showStatus(msg, color) {
            statusMsg.textContent = msg;
            statusMsg.className = `fixed bottom-4 right-4 ${color} text-white px-4 py-2 rounded-xl shadow-lg transition-all z-50`;
            statusMsg.style.opacity = '1';
            setTimeout(() => { statusMsg.style.opacity = '0'; }, 3000);
        }

        window.copyToken = () => {
            tokenDisplay.select();
            document.execCommand('copy');
            showStatus("Token disalin!", "bg-indigo-600");
        }

        window.onload = initAuth;
    </script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-[2rem] shadow-2xl border border-gray-100 overflow-hidden">
        <!-- Header -->
        <div class="bg-gradient-to-br from-indigo-600 to-blue-700 p-8 text-white">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-3xl font-black tracking-tight">Tasks</h1>
                    <p id="authStatus" class="text-xs text-indigo-100 mt-1">Connecting...</p>
                </div>
                <button id="notifBtn" class="bg-white/20 hover:bg-white/30 p-3 rounded-2xl backdrop-blur-md transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Content -->
        <div class="p-6">
            <div class="flex gap-2 mb-8">
                <input type="text" id="taskInput" placeholder="Tugas baru..." 
                    class="flex-1 px-5 py-3 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all">
                <button id="addBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-2xl font-bold shadow-lg shadow-indigo-100 active:scale-95 transition-all">
                    +
                </button>
            </div>

            <div id="taskList" class="max-h-80 overflow-y-auto px-1">
                <!-- Data dari Firestore -->
            </div>

            <!-- Token Section (Hidden until requested) -->
            <div class="mt-8 hidden">
                <p class="text-[10px] text-gray-400 font-bold uppercase mb-2">Device Token (For Testing):</p>
                <div class="flex gap-1">
                    <input type="text" id="tokenDisplay" readonly class="text-[10px] bg-gray-50 border border-gray-100 p-2 rounded-lg flex-1 overflow-hidden overflow-ellipsis outline-none">
                    <button onclick="copyToken()" class="text-[10px] bg-indigo-50 text-indigo-600 px-3 rounded-lg font-bold">Copy</button>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="bg-gray-50 p-6 text-center border-t border-gray-100">
            <p class="text-[10px] text-gray-400 leading-relaxed">
                Hosting di GitHub Pages untuk mencoba notifikasi.<br>
                Service Worker: <span class="font-mono">firebase-messaging-sw.js</span>
            </p>
        </div>
    </div>

    <!-- Notification -->
    <div id="statusMsg" class="opacity-0 pointer-events-none"></div>

</body>
</html>
