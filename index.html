<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Task Manager + Push</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-messaging.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-h39tlvtH3Phe9F9MisHGUb57VuOl_9s",
            authDomain: "latihan-firebase-c8288.firebaseapp.com",
            projectId: "latihan-firebase-c8288",
            storageBucket: "latihan-firebase-c8288.firebasestorage.app",
            messagingSenderId: "827332191451",
            appId: "1:827332191451:web:be1f7f4cf8b18bcb59d8fe",
            measurementId: "G-80EE35QN31"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const messaging = getMessaging(app);
        const appId = 'latihan-firebase-c8288';
        const VAPID_KEY = "BC0VTzq3QEXGEhg57GCk-mjDQGg25aH0qypuaBpSlX8n1dGJySAme_BplviUYER0XsCykz1__aF9586Fu-oQbk8";

        const statusMsg = document.getElementById('statusMsg');
        const tokenDisplay = document.getElementById('tokenDisplay');
        const tokenSection = document.getElementById('tokenSection');

        async function registerSW() {
            if ('serviceWorker' in navigator) {
                try {
                    const registration = await navigator.serviceWorker.register('./firebase-messaging-sw.js');
                    return registration;
                } catch (err) {
                    console.error('SW Register Error:', err);
                    return null;
                }
            }
            return null;
        }

        async function requestNotificationPermission() {
            try {
                showStatus("Meminta izin...", "bg-blue-500");
                const swReg = await registerSW();
                const permission = await Notification.requestPermission();
                
                if (permission === 'granted') {
                    const token = await getToken(messaging, { 
                        vapidKey: VAPID_KEY,
                        serviceWorkerRegistration: swReg 
                    });

                    if (token) {
                        tokenDisplay.value = token;
                        tokenSection.classList.remove('hidden');
                        showStatus("Notifikasi Aktif!", "bg-green-600");
                        console.log("Token Baru:", token);
                    }
                } else {
                    // Jika di HP tetap "denied", ini akan muncul
                    showStatus("Izin Ditolak (" + permission + "). Reset di browser!", "bg-red-500");
                }
            } catch (error) {
                console.error("FCM Error:", error);
                showStatus("Error: " + error.code, "bg-red-600");
            }
        }

        // Handle notifikasi saat aplikasi TERBUKA (Foreground)
        onMessage(messaging, (payload) => {
            console.log('Pesan Foreground:', payload);
            // Munculkan notifikasi manual karena browser tidak otomatis memunculkan toast jika tab aktif
            new Notification(payload.notification.title, {
                body: payload.notification.body,
                icon: 'https://cdn-icons-png.flaticon.com/512/3119/3119338.png'
            });
            showStatus("Pesan: " + payload.notification.title, "bg-indigo-600");
        });

        // Test Lokal (Tanpa Firebase) untuk cek apakah HP/PC bisa notif
        window.testLocalNotif = () => {
            if (Notification.permission === 'granted') {
                new Notification("Test Berhasil!", { body: "Browser kamu bisa memunculkan notifikasi." });
            } else {
                showStatus("Klik lonceng dulu!", "bg-yellow-500");
            }
        };

        // Event Listeners
        document.getElementById('notifBtn').addEventListener('click', requestNotificationPermission);
        document.getElementById('addBtn').addEventListener('click', async () => {
            const input = document.getElementById('taskInput');
            if (!input.value.trim()) return;
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'tasks'), { 
                text: input.value, createdAt: serverTimestamp() 
            });
            input.value = "";
        });

        const initAuth = async () => { await signInAnonymously(auth); };
        onAuthStateChanged(auth, (user) => { if(user) loadTasks(); });

        function loadTasks() {
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'tasks');
            onSnapshot(colRef, (snap) => {
                const list = document.getElementById('taskList');
                list.innerHTML = "";
                snap.forEach((d) => {
                    const div = document.createElement('div');
                    div.className = "flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm mb-3 border border-gray-100";
                    div.innerHTML = `<span>${d.data().text}</span>
                        <button onclick="deleteTask('${d.id}')" class="text-red-400 font-bold">Hapus</button>`;
                    list.appendChild(div);
                });
            });
        }

        window.deleteTask = async (id) => {
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', id));
        };

        function showStatus(msg, color) {
            statusMsg.textContent = msg;
            statusMsg.className = `fixed bottom-4 right-4 ${color} text-white px-4 py-2 rounded-xl shadow-lg z-50 transition-all`;
            statusMsg.style.opacity = '1';
            setTimeout(() => statusMsg.style.opacity = '0', 4000);
        }

        window.onload = initAuth;
    </script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-[2rem] shadow-2xl overflow-hidden border border-gray-200">
        <div class="bg-indigo-600 p-8 text-white flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold">Task Manager</h1>
                <p class="text-xs opacity-70">Firebase Push Notification</p>
            </div>
            <button id="notifBtn" class="bg-white/20 p-3 rounded-2xl hover:bg-white/30 transition-all active:scale-90">🔔</button>
        </div>
        <div class="p-6">
            <div class="flex gap-2 mb-6">
                <input type="text" id="taskInput" placeholder="Tulis tugas..." class="flex-1 px-4 py-3 bg-gray-50 rounded-xl outline-none border border-gray-100 focus:border-indigo-300 transition-all">
                <button id="addBtn" class="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold">Add</button>
            </div>
            
            <div id="taskList" class="space-y-1"></div>

            <div id="tokenSection" class="mt-8 pt-6 border-t border-gray-100 hidden">
                <p class="text-[10px] text-gray-400 font-bold mb-2 uppercase tracking-widest">Device Token:</p>
                <textarea id="tokenDisplay" readonly class="w-full text-[9px] bg-gray-50 p-3 rounded-xl border border-gray-100 font-mono h-20 outline-none resize-none"></textarea>
                <button onclick="testLocalNotif()" class="mt-3 w-full py-2 bg-gray-100 text-gray-600 rounded-xl text-xs font-bold hover:bg-gray-200 transition-all">
                    Test Munculkan Notifikasi
                </button>
            </div>
        </div>
    </div>
    <div id="statusMsg" class="opacity-0 pointer-events-none"></div>
</body>
</html>
